<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Rune Delver — Rune List</title>
<style>
  body { font-family: system-ui, sans-serif; font-size: 14px; color: #1a1a1a; background: #fff; margin: 0; padding: 1.5rem; }
  h1 { font-size: 20px; font-weight: 500; margin: 0 0 1rem; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.25rem; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 6px; border: 0.5px solid #ccc; background: #fff; color: #666; cursor: pointer; }
  .filter-btn.active { background: #f0f0f0; color: #1a1a1a; border-color: #999; font-weight: 500; }
  .group { margin-bottom: 1.75rem; }
  .group-label { font-size: 11px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 0.5px solid #e5e5e5; }
  .rune-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 6px; }
  .rune-card { border: 0.5px solid #e5e5e5; border-radius: 8px; padding: 8px 10px; }
  .rune-card.meta { border-style: dashed; }
  .rune-top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; flex-wrap: wrap; }
  .rune-name { font-size: 14px; font-weight: 500; font-family: monospace; letter-spacing: 0.1em; }
  .rune-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 10px; }
  .tag-m { background: #e6f1fb; color: #185fa5; }
  .tag-s { background: #eaf3de; color: #3b6d11; }
  .tag-u { background: #f3f3f3; color: #555; }
  .tag-meta { background: #faeeda; color: #854f0b; }
  .shared-note { font-size: 10px; color: #aaa; font-style: italic; }
  .rune-desc { font-size: 12px; color: #666; line-height: 1.5; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; color: #e8e8e8; }
    .filter-btn { background: #222; border-color: #444; color: #aaa; }
    .filter-btn.active { background: #333; color: #e8e8e8; border-color: #666; }
    .group-label { color: #666; border-color: #333; }
    .rune-card { border-color: #333; }
    .rune-desc { color: #999; }
    .tag-m { background: #0c2a45; color: #85b7eb; }
    .tag-s { background: #0f1f0f; color: #97c459; }
    .tag-u { background: #2a2a2a; color: #aaa; }
    .tag-meta { background: #2a1f00; color: #ef9f27; }
    .shared-note { color: #555; }
  }
</style>
</head>
<body>

<h1>Rune Delver — rune list</h1>

<div class="filter-row" id="filters"></div>
<div id="rune-list"></div>

<script>
const groups = [
  { label: 'Fire / Metal / Forge', runes: [
    { n:'FIRE', t:['U'], d:'Ignites a target or object. Scales from a spark to a conflagration engulfing a zone.' },
    { n:'BURN', t:['U'], d:'Sustained combustion — fire that spreads and lingers. Duration and area over burst damage.' },
    { n:'SMOG', t:['U'], d:'Toxic fumes. Poisons targets, creates a choking zone. Scales to a persistent poisoned area.' },
    { n:'MELT', t:['M'], d:'Dissolution by heat. Destroys objects, softens armor, collapses structures. Fire as entropy.' },
    { n:'IRON', t:['U'], d:'The forge rune. Hardens weapons and armor, transmutes materials. Fire and earth as craft.' },
    { n:'WYRM', t:['M','S'], d:'Draconic fire / great serpent spirits. Mage: ancient destructive flame. Shaman: void serpent communion. Shared rune.' },
  ]},
  { label: 'Water / Ice', runes: [
    { n:'TIDE', t:['S'], d:'Flowing water — push, pull, current, wave. Force and movement. Scales from a jet to a flood.' },
    { n:'RIME', t:['M'], d:'Ice and frost. Freezes targets, creates slick terrain. Immobilization over raw damage.' },
    { n:'MIST', t:['U'], d:'Obscuring vapor. Cover, concealment, blurs vision. Utility and evasion.' },
    { n:'WAVE', t:['S'], d:'A cresting surge. More aggressive than TIDE — impact and knockback.' },
    { n:'RAIN', t:['S'], d:'Persistent precipitation. Slows enemies, extinguishes fire, creates difficult terrain.' },
    { n:'GILL', t:['U'], d:'Breathe and move freely underwater. At higher tiers, extend to the whole party.' },
    { n:'FLOW', t:['S'], d:'Shape and redirect water. Channel, dam, or release. Control over force.' },
    { n:'CURE', t:['S'], d:'Removes poisons and toxins — water purifying the body. Distinct from HEAL which restores HP.' },
  ]},
  { label: 'Earth / Seismic', runes: [
    { n:'RUIN', t:['M'], d:'Seismic force. Erupting rock spikes, falling debris, earthquake at high tiers. Terrain destruction.' },
    { n:'SAND', t:['U'], d:'Loose earth — blinding clouds, shifting ground, partial burial. Subtler than RUIN.' },
    { n:'DUST', t:['U'], d:'Fine particulate. Obscures, clogs mechanisms, suffocates at high tiers.' },
    { n:'HOLE', t:['M'], d:'Tunneling and excavation. Opens passages, creates pit traps, collapses floors.' },
    { n:'MOVE', t:['S'], d:'Shape earth at will — raise walls, lower terrain, redirect tunnels. The terraforming rune.' },
    { n:'IRON', t:['U'], d:'Shared with Fire — earth reads it as mineral hardness rather than forge heat.', shared: true },
  ]},
  { label: 'Plant / Growth / Nature', runes: [
    { n:'GROW', t:['S'], d:'Accelerates growth. Heals plants, creates difficult terrain, entangles at higher tiers.' },
    { n:'ROOT', t:['S'], d:'Immobilization. Roots erupt and hold targets. Pure control.' },
    { n:'VINE', t:['S'], d:'Climbing, binding, grappling. More mobile than ROOT — vines reach and wrap.' },
    { n:'BARK', t:['S'], d:'Natural armor from living wood. Grants AR rating to a target.' },
    { n:'TREE', t:['S'], d:'Summon or animate a tree. Barrier, ally, or structural element depending on MP spent.' },
    { n:'LEAF', t:['S'], d:'Featherfall, camouflage, gentle landing. Subtle nature magic, utility-focused.' },
    { n:'MOSS', t:['S'], d:'Slow and silent growth. Muffles sound, slicks surfaces, conceals passages.' },
    { n:'MOLD', t:['S'], d:'Decay and rot. Weakens structures and objects. The dark side of nature.' },
    { n:'SEED', t:['S'], d:'Plant and grow something specific. Slow but permanent — results outlast the casting.' },
    { n:'HEAL', t:['S','U'], d:'Restore HP on touch. Nature tradition reads the body as a living thing returning to health.' },
  ]},
  { label: 'Air / Wind / Sound', runes: [
    { n:'GALE', t:['M'], d:'Offensive wind. Knockback, buffeting, forced movement. Scales to a localized storm.' },
    { n:'GUST', t:['U'], d:'A directed burst of air. Pushes objects, deflects missiles, creates brief openings.' },
    { n:'RUSH', t:['U'], d:'Speed. Burst movement for caster or target. Wind as momentum.' },
    { n:'WAIL', t:['M'], d:'Sonic attack. Disorienting sound, structural damage at high tiers. Pain and confusion.' },
    { n:'HUSH', t:['U'], d:'Silence a zone or target. Prevents spellcasting, communication, and detection by sound.' },
    { n:'LIFT', t:['U'], d:'Levitation. Float objects or targets. At high tiers, true flight.' },
    { n:'KEEN', t:['M'], d:'Sharpness and precision — wind as a cutting edge. Slash damage at range. Borders on Dark.' },
    { n:'SLOW', t:['U'], d:'Reduce movement and action speed. Wind as resistance and drag.' },
    { n:'HOWL', t:['S'], d:'Shared with Beast — a spirit wind cry. Terror or inspiration depending on caster intent.', shared: true },
  ]},
  { label: 'Light / Holy', runes: [
    { n:'GLOW', t:['U'], d:'Create light. At higher tiers, blinding radiance or a persistent beacon.' },
    { n:'DAWN', t:['S'], d:'Holy light — potent against undead and spirits. The ceremonial Ethos church rune.' },
    { n:'WARD', t:['U'], d:'Protective barrier. Ignore non-magical attacks at low tiers, absorb magical at high.' },
    { n:'BANE', t:['U'], d:'Light as the enemy of darkness. Specifically effective against undead, spirits, dark magic.' },
    { n:'SMIT', t:['M'], d:'Righteous destruction. Concentrated holy force on one target. The offensive light rune.' },
    { n:'PURE', t:['U'], d:'Cleanse corruption, curse, contamination. Removes conditions caused by dark magic.' },
    { n:'MEND', t:['U'], d:'Restore objects and minor physical damage. Light as repair.' },
    { n:'LIFE', t:['U'], d:'The resurrection rune. Revive a defeated character. High MP cost — significant consequences.' },
    { n:'SEAL', t:['U'], d:'Lock and bind. Seals doors, traps spirits, prevents passage. Permanent until broken.' },
    { n:'MOON', t:['S'], d:'Cycles and tides of power. Buffs and transforms depending on phase. Shaman-specific.' },
    { n:'STAR', t:['M'], d:'Celestial force — distant and precise. Guidance, navigation, targeted energy from above.' },
  ]},
  { label: 'Dark / Void / Arcane', runes: [
    { n:'VOID', t:['M'], d:'Pure negation. Erases matter, magic, and effect. The most absolute destructive rune.' },
    { n:'FADE', t:['U'], d:'Invisibility and ethereal movement. Pass through walls at high tiers.' },
    { n:'NULL', t:['M'], d:'Antimagic. Dispel active spells, disrupt relic tech, counter other RUNE castings.' },
    { n:'DOOM', t:['M'], d:'Mark a target for death. Low tiers: a curse. High tiers: instant defeat regardless of HP.' },
    { n:'DETH', t:['M'], d:'The forbidden rune. Instant death effect. Transgressive knowledge most traditions hide.' },
    { n:'PALL', t:['M'], d:'Darkness descends. Magical shadow blocks light, disorients, and frightens.' },
    { n:'DUSK', t:['U'], d:'The threshold rune — neither light nor dark. See in darkness, pass between states.' },
    { n:'WANE', t:['M'], d:'Diminish and weaken. Reduce stats, drain MP, sap strength over time.' },
    { n:'FEAR', t:['U'], d:'Panic and rout. Targets flee or freeze. Does not affect undead or mindless creatures.' },
    { n:'WYRM', t:['M','S'], d:'Shared with Fire — dark tradition reads it as the void serpent rather than draconic flame.', shared: true },
  ]},
  { label: 'Mind / Spirit', runes: [
    { n:'LINK', t:['U'], d:'Read surface thoughts. At high tiers, two-way mental connection or full mind-read.' },
    { n:'SEND', t:['U'], d:'Psychic message. 10 words at 1 MP, scales to full mental conversation at range.' },
    { n:'CALM', t:['U'], d:'Pacify aggression in any target. Breaks if attacked. Does not work on mindless creatures.' },
    { n:'STUN', t:['U'], d:'Immobilize one target briefly. Standard control.' },
    { n:'BIND', t:['M'], d:'Compulsion. Force a specific action or behavior. Stronger than CALM — active control.' },
    { n:'WARP', t:['M'], d:'Distort perception. Targets see false images, lose direction, believe untrue things.' },
    { n:'LULL', t:['U'], d:'Sleep. Willing or unwilling depending on MP spent.' },
    { n:'RING', t:['S'], d:'Spirit communion. Reach across to the spirit world, call or speak with specific entities.' },
  ]},
  { label: 'Beast / Animal', runes: [
    { n:'CALL', t:['S'], d:"Summon the caster's bonded familiar or spirit animal. At high tiers, call wild animals to aid." },
    { n:'WILD', t:['S'], d:'Awaken beast nature. Enhance animal instincts, grant feral senses and abilities.' },
    { n:'FANG', t:['S'], d:'Tooth and claw — natural weapon attack. Bite, tear, poison at high tiers.' },
    { n:'PACK', t:['S'], d:'Rally allies around a common purpose. Morale and coordination — the wolf-pack effect.' },
    { n:'HOWL', t:['S'], d:'A cry that carries. Terror or inspiration depending on intent. Shared with Air.', shared: true },
    { n:'HUNT', t:['S'], d:"Track and pursue unerringly. Unerring sense of a target's location. Cannot lose the quarry." },
    { n:'TAME', t:['S'], d:'Animal-specific CALM. Docility toward the caster. Permanent at high tiers.' },
    { n:'LURE', t:['S'], d:'Draw creatures toward the caster. Works on animals and spirits. Borders on illusion.' },
  ]},
  { label: 'Movement / Space', runes: [
    { n:'PASS', t:['U'], d:'Move through locked doors and solid surfaces. Reverse seals a door magically.' },
    { n:'RISE', t:['U'], d:'Fly. Half speed, any direction. Falls if caster is knocked out.' },
    { n:'LEAP', t:['U'], d:'Enhanced jumping. Cross gaps, reach heights, land safely from any fall.' },
    { n:'DASH', t:['U'], d:'Instant movement burst. Short-range teleport or extreme speed for one action.' },
    { n:'STOP', t:['M'], d:'Freeze time for one target. No actions but also invulnerable while stopped.' },
    { n:'SWAP', t:['M'], d:'Exchange positions of two targets. Tactical repositioning or defensive use.' },
  ]},
  { label: 'Knowledge / Detection', runes: [
    { n:'FIND', t:['U'], d:'Locate treasure or a specific object within range. Dowsing. Does not reveal guardians.' },
    { n:'GAZE', t:['M'], d:'See through walls up to 10ft thick. Targets seen can be targeted by spells.' },
    { n:'KNOW', t:['U'], d:'Identify the properties of a magic item or relic. One item per round.' },
    { n:'READ', t:['M'], d:'Understand any written language or inscription, including ancient runes and old-world script.' },
    { n:'SEEK', t:['U'], d:'Sense the presence of a specific thing — magic, life, spirits — within range.' },
    { n:'MARK', t:['U'], d:'Leave a magical signature or beacon. Invisible except to detection. Permanent until dispelled.' },
    { n:'SCAN', t:['M'], d:"Read a target's surface information — alignment, tier, active spells, current HP." },
  ]},
  { label: 'Meta runes (combiners)', runes: [
    { n:'WALL', t:['META'], d:'Combine with an element to create a barrier. FIRE+WALL, RIME+WALL, VINE+WALL, etc. Inert alone.' },
    { n:'RUNE', t:['META'], d:'Inscribe another rune onto a surface for delayed or conditional activation.' },
    { n:'ECHO', t:['META'], d:'Repeat the last rune cast for 1 MP regardless of the source spell tier.' },
    { n:'FLUX', t:['META'], d:'Amplify or alter an active magical effect. Combined with another rune to boost or modify it.' },
  ]},
];

const traditions = ['All','Mage','Shaman','Universal','Meta'];
let active = 'All';

function render() {
  const list = document.getElementById('rune-list');
  list.innerHTML = '';
  groups.forEach(g => {
    const visible = g.runes.filter(r => {
      if (active === 'All') return true;
      if (active === 'Meta') return r.t.includes('META');
      if (active === 'Mage') return r.t.includes('M');
      if (active === 'Shaman') return r.t.includes('S');
      if (active === 'Universal') return r.t.includes('U');
      return true;
    });
    if (!visible.length) return;
    const div = document.createElement('div');
    div.className = 'group';
    div.innerHTML = `<div class="group-label">${g.label}</div><div class="rune-grid" id="grid-${g.label.replace(/\W/g,'_')}"></div>`;
    list.appendChild(div);
    const grid = div.querySelector('.rune-grid');
    visible.forEach(r => {
      const tags = r.t.map(t => {
        if (t==='M') return `<span class="tag tag-m">Mage</span>`;
        if (t==='S') return `<span class="tag tag-s">Shaman</span>`;
        if (t==='U') return `<span class="tag tag-u">Universal</span>`;
        if (t==='META') return `<span class="tag tag-meta">Meta</span>`;
        return '';
      }).join('');
      const card = document.createElement('div');
      card.className = 'rune-card' + (r.t.includes('META') ? ' meta' : '');
      card.innerHTML = `
        <div class="rune-top">
          <span class="rune-name">${r.n}</span>
          <div class="rune-tags">${tags}</div>
          ${r.shared ? '<span class="shared-note">shared rune</span>' : ''}
        </div>
        <div class="rune-desc">${r.d}</div>`;
      grid.appendChild(card);
    });
  });
}

const filterRow = document.getElementById('filters');
traditions.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (t === 'All' ? ' active' : '');
  btn.textContent = t;
  btn.onclick = () => {
    active = t;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  filterRow.appendChild(btn);
});

render();
</script>
</body>
</html>
